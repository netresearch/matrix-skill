<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Comparison card</title>
<style>
  :root {
    --ink: #0e1116;
    --ink-soft: #44505d;
    --ink-faint: #7d8896;
    --paper: #fafaf7;
    --line: #e3e1d8;
    --bad: #8a3a2a;
    --good: #2f6f3e;
    --bad-bg: #f8eee9;
    --good-bg: #ecf2ec;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px; height: 900px;
    background: var(--paper);
    color: var(--ink);
    font-family: ui-sans-serif, "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .frame {
    margin: 32px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 48px 56px 56px;
    height: calc(900px - 64px);
    display: flex; flex-direction: column;
  }
  .head {
    margin-bottom: 28px;
  }
  .label {
    font-family: ui-monospace, "JetBrains Mono", monospace;
    font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 10px;
  }
  h1 {
    font-size: 44px; letter-spacing: -0.02em; margin: 0 0 10px;
    font-weight: 600; text-wrap: balance;
  }
  .sub {
    font-size: 18px; color: var(--ink-soft); margin: 0;
  }
  .pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    flex: 1;
  }
  .panel {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 28px 32px;
    display: flex; flex-direction: column;
  }
  .panel.bad { background: var(--bad-bg); border-color: #e8c8be; }
  .panel.good { background: var(--good-bg); border-color: #c8d8c8; }
  .panel h2 {
    margin: 0 0 6px;
    font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 600;
  }
  .panel.bad h2 { color: var(--bad); }
  .panel.good h2 { color: var(--good); }
  .panel .heading {
    font-size: 24px; font-weight: 600; letter-spacing: -0.01em;
    margin: 0 0 18px; color: var(--ink);
  }
  .panel ul {
    margin: 0; padding: 0; list-style: none;
    flex: 1;
  }
  .panel li {
    font-size: 16px; line-height: 1.45;
    padding: 6px 0 6px 22px; position: relative;
    color: var(--ink);
  }
  .panel.bad li::before {
    content: "✗"; position: absolute; left: 0; top: 6px;
    color: var(--bad); font-weight: 600;
  }
  .panel.good li::before {
    content: "✓"; position: absolute; left: 0; top: 6px;
    color: var(--good); font-weight: 600;
  }
  .panel li code {
    font-family: ui-monospace, "JetBrains Mono", monospace;
    font-size: 0.92em;
    background: rgba(0,0,0,0.04);
    padding: 1px 5px; border-radius: 3px;
  }
  .footer {
    margin-top: 24px; padding-top: 16px;
    border-top: 1px solid var(--line);
    display: flex; justify-content: space-between;
    font-family: ui-monospace, "JetBrains Mono", monospace;
    font-size: 13px; color: var(--ink-faint);
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="head">
      <div class="label">{{LABEL}}</div>
      <h1>{{TITLE}}</h1>
      <p class="sub">{{SUBTITLE}}</p>
    </div>

    <div class="pair">
      <div class="panel bad">
        <h2>{{LEFT_LABEL}}</h2>
        <div class="heading">{{LEFT_HEADING}}</div>
        <ul>
          <li>{{LEFT_1}}</li>
          <li>{{LEFT_2}}</li>
          <li>{{LEFT_3}}</li>
          <li>{{LEFT_4}}</li>
        </ul>
      </div>

      <div class="panel good">
        <h2>{{RIGHT_LABEL}}</h2>
        <div class="heading">{{RIGHT_HEADING}}</div>
        <ul>
          <li>{{RIGHT_1}}</li>
          <li>{{RIGHT_2}}</li>
          <li>{{RIGHT_3}}</li>
          <li>{{RIGHT_4}}</li>
        </ul>
      </div>
    </div>

    <div class="footer">
      <span>{{CONTEXT}}</span>
      <span><b style="color:var(--ink)">{{ORG}}</b> · matrix announcement</span>
    </div>
  </div>
</body>
</html>
